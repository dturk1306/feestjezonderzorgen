name: Update sitemap lastmod

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update lastmod in sitemap.xml
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-update sitemap lastmod to $(date +%Y-%m-%d) [skip ci]"
          git push
